<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login | HubStudio</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{min-height:100vh;background:linear-gradient(135deg,rgba(0,0,0,.96),rgba(233,0,52,.78));display:flex;align-items:center;justify-content:center}.box{width:100%;max-width:420px;background:#fff;border-radius:22px;padding:34px;border-top:6px solid #e90034;box-shadow:0 20px 60px rgba(0,0,0,.45)}.login-logo{width:82px;height:82px;object-fit:contain;display:block;margin:auto}.form-control{border-radius:12px;padding:12px}.btn{background:#e90034;color:white;border-radius:12px;padding:12px;font-weight:700}</style>
</head>
<body><div class="box"><div class="text-center mb-4"><img class="login-logo" src="{{url_for('static',filename='logo.png')}}" alt="Logo HubStudio" onerror="this.style.display='none'"><h3 class="fw-bold">HubStudio App</h3><p class="text-muted">Gestão comercial e produção</p></div>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="alert alert-{{c}}">{{m}}</div>{% endfor %}{% endwith %}<form method="post"><label class="fw-semibold">Usuário</label><input class="form-control mb-3" name="usuario" required><label class="fw-semibold">Senha</label><input class="form-control mb-4" type="password" name="senha" required><button class="btn w-100">Entrar</button></form></div></body></html>
