<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | HubStudio App</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<style>
    body {
        min-height: 100vh;
        background:
            linear-gradient(135deg, rgba(0, 0, 0, 0.96), rgba(233, 0, 52, 0.78)),
            #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        color: #000000;
        border-radius: 22px;
        padding: 34px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        border-top: 6px solid #e90034;
    }

    .brand-mark {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px auto;
        overflow: hidden;
    }

    .brand-mark img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }
    
    .form-control {
        border-radius: 12px;
        padding: 12px;
        border: 1px solid #dddddd;
    }

    .form-control:focus {
        border-color: #e90034;
        box-shadow: 0 0 0 0.2rem rgba(233, 0, 52, 0.18);
    }

    .btn-login {
        background: #e90034;
        border: none;
        color: #ffffff;
        border-radius: 12px;
        padding: 12px;
        font-weight: 700;
    }

    .btn-login:hover {
        background: #c9002d;
        color: #ffffff;
    }

    .small-muted {
        color: #666666;
        font-size: 0.9rem;
    }

    .alert {
        border-radius: 12px;
        font-size: 0.92rem;
    }
</style>

<div class="login-card">
    <div class="brand-mark">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="HubStudio App">
    </div>

    <div class="text-center mb-4">
        <h3 class="fw-bold mb-1">HubStudio App</h3>
        <p class="small-muted mb-0">Controle de vendas e planejamento</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-3">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} mb-2" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
            <label for="usuario" class="form-label fw-semibold">Usuário</label>
            <input 
                type="text" 
                class="form-control" 
                id="usuario" 
                name="usuario" 
                placeholder="Digite seu usuário"
                autocomplete="username"
                required
            >
        </div>

        <div class="mb-4">
            <label for="senha" class="form-label fw-semibold">Senha</label>
            <input 
                type="password" 
                class="form-control" 
                id="senha" 
                name="senha" 
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required
            >
        </div>

        <button type="submit" class="btn btn-login w-100">
            Entrar
        </button>
    </form>

    <div class="text-center mt-4">
        <span class="small-muted">Acesso restrito à rede local</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
