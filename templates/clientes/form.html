<div class="cliente-form-scroll">
    <style>
        .cliente-form-scroll {
            max-height: 68vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 0.35rem;
        }

        .cliente-form-section {
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 18px;
            padding: 18px;
            background: #ffffff;
        }

        .cliente-form-section + .cliente-form-section {
            margin-top: 18px;
        }

        .cliente-form-section-title {
            font-weight: 700;
            margin-bottom: 2px;
        }

        .cliente-form-section-subtitle {
            color: #777777;
            font-size: 0.875rem;
            margin-bottom: 16px;
        }
    </style>

    <div class="cliente-form-section">
        <div class="mb-3">
            <h6 class="cliente-form-section-title">Empresa</h6>
            <p class="cliente-form-section-subtitle">
                Dados cadastrais da empresa cliente.
            </p>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Nome da empresa *</label>
                <input
                    type="text"
                    name="nome"
                    class="form-control"
                    value="{{ cliente_form.nome if cliente_form else '' }}"
                    required
                >
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">CNPJ</label>
                <input
                    type="text"
                    name="cnpj"
                    class="form-control"
                    value="{{ cliente_form.cnpj if cliente_form and cliente_form.cnpj else '' }}"
                >
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Telefone da empresa</label>
                <input
                    type="text"
                    name="telefone"
                    class="form-control"
                    value="{{ cliente_form.telefone if cliente_form and cliente_form.telefone else '' }}"
                >
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">E-mail da empresa</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="{{ cliente_form.email if cliente_form and cliente_form.email else '' }}"
                >
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Tags</label>
                <input
                    type="text"
                    name="tags"
                    class="form-control"
                    value="{{ cliente_form.tags if cliente_form and cliente_form.tags is defined and cliente_form.tags else '' }}"
                    placeholder="Ex: recorrente, social media, tráfego pago, prioridade"
                >
                <small class="text-muted">Separe as tags por vírgula.</small>
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Observação</label>
                <textarea name="observacoes" class="form-control" rows="3">{{ cliente_form.observacoes if cliente_form and cliente_form.observacoes else '' }}</textarea>
            </div>

            {% if mostrar_status %}
                <div class="col-12">
                    <div class="form-check">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            name="ativo"
                            id="ativoCliente{{ cliente_form.id }}"
                            {% if cliente_form and cliente_form.ativo %}checked{% endif %}
                        >
                        <label class="form-check-label fw-semibold" for="ativoCliente{{ cliente_form.id }}">
                            Cliente ativo
                        </label>
                    </div>
                </div>
            {% endif %}
        </div>
    </div>

    <div class="cliente-form-section">
        <div class="mb-3">
            <h6 class="cliente-form-section-title">Responsável</h6>
            <p class="cliente-form-section-subtitle">
                Pessoa de contato principal dentro da empresa.
            </p>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-semibold">Nome do responsável</label>
                <input
                    type="text"
                    name="responsavel_nome"
                    class="form-control"
                    value="{{ cliente_form.responsavel_nome if cliente_form and cliente_form.responsavel_nome is defined and cliente_form.responsavel_nome else cliente_form.responsavel if cliente_form and cliente_form.responsavel is defined and cliente_form.responsavel else '' }}"
                >
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">Celular do responsável</label>
                <input
                    type="text"
                    name="responsavel_celular"
                    class="form-control"
                    value="{{ cliente_form.responsavel_celular if cliente_form and cliente_form.responsavel_celular is defined and cliente_form.responsavel_celular else '' }}"
                >
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">Contato</label>
                <input
                    type="text"
                    name="responsavel_contato"
                    class="form-control"
                    value="{{ cliente_form.responsavel_contato if cliente_form and cliente_form.responsavel_contato is defined and cliente_form.responsavel_contato else '' }}"
                    placeholder="Ex: WhatsApp, e-mail, cargo, LinkedIn..."
                >
            </div>
        </div>
    </div>
</div>
